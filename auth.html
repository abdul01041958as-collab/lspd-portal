<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD — Вход</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui;background:#0a0c15;color:#e8edf5;text-align:center;padding-top:100px}
        .google-btn{background:#4285F4;color:white;padding:12px 24px;border:none;border-radius:30px;font-size:16px;cursor:pointer;margin-top:20px}
        .google-btn:hover{background:#2a6ef0}
        .lspd-badge{font-size:80px;margin-bottom:20px}
        .btn{background:#00aaff;color:#0a0c15;padding:10px 20px;border:none;border-radius:30px;font-weight:bold;cursor:pointer}
        input{width:100%;padding:12px;margin:10px 0;background:#0a0c15;border:1px solid #00aaff;color:white;border-radius:8px}
    </style>
</head>
<body>
    <div id="authContent"></div>

    <script>
        const SUPABASE_URL = 'https://xhgudkefqmntnekaxgke.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Svhz_VfE3OTEJckPSHoHrw_2e5BxGQF';
        const CHIEF_EMAIL = 'abdul01041958.as@gmail.com';

        function showLoginScreen() {
            document.getElementById('authContent').innerHTML = `
                <div class="lspd-badge">👮‍♂️⭐👮‍♀️</div>
                <h1 style="color:#00aaff">LSPD PORTAL</h1>
                <p>Вход через Google</p>
                <button class="google-btn" onclick="loginWithGoogle()">🔐 Войти через Google</button>
            `;
        }

        function loginWithGoogle() {
            const redirectTo = window.location.origin + '/auth.html';
            window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(redirectTo)}`;
        }

        async function getDBUser(email) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${encodeURIComponent(email)}`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const data = await res.json();
            return data[0];
        }

        async function saveDBUser(email, firstName, lastName, avatarUrl) {
            const roleId = email === CHIEF_EMAIL ? 1 : 15;
            const positionName = email === CHIEF_EMAIL ? 'Шеф полиции' : 'Рядовой сотрудник';
            const existing = await getDBUser(email);
            if (!existing) {
                await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, first_name: firstName, last_name: lastName, avatar_url: avatarUrl, role_id: roleId, position_name: positionName, hired_date: new Date().toISOString() })
                });
            } else if (existing.first_name !== firstName || existing.last_name !== lastName) {
                await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${existing.id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ first_name: firstName, last_name: lastName })
                });
            }
            return getDBUser(email);
        }

        function showNameForm(email, avatarUrl) {
            document.getElementById('authContent').innerHTML = `
                <div style="max-width:400px;margin:0 auto;padding:20px;">
                    <div class="lspd-badge">👮</div>
                    <h2>Заполните имя и фамилию</h2>
                    <input type="text" id="firstName" placeholder="Имя">
                    <input type="text" id="lastName" placeholder="Фамилия">
                    <button class="btn" onclick="submitNameForm('${email}','${avatarUrl}')">Сохранить</button>
                </div>
            `;
        }

        window.submitNameForm = async (email, avatarUrl) => {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            if (!firstName || !lastName) return alert('Заполните оба поля');
            await saveDBUser(email, firstName, lastName, avatarUrl);
            // Перенаправляем на dashboard
            window.location.href = '/dashboard.html';
        };

        async function handleAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                localStorage.setItem('token', token);
                const user = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` }
                }).then(r => r.json());

                if (user) {
                    const email = user.email;
                    const dbUser = await getDBUser(email);
                    if (dbUser && dbUser.first_name && dbUser.last_name) {
                        localStorage.setItem('lspd_user', JSON.stringify(dbUser));
                        window.location.href = '/dashboard.html';
                    } else {
                        showNameForm(email, user.user_metadata.avatar_url);
                    }
                } else {
                    showLoginScreen();
                }
            } else {
                showLoginScreen();
            }
        }

        handleAuth();
    </script>
</body>
</html>
