<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD Blackberry RP — Дашборд</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0c15;color:#e8edf5;font-family:'Segoe UI',system-ui;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        h1{color:#00aaff;text-align:center;margin-bottom:20px}
        .status{text-align:center;margin-top:20px;color:#00ff88}
        pre{background:#1a1f2e;padding:15px;border-radius:12px;margin-top:20px;overflow-x:auto}
    </style>
</head>
<body>
<div class="container">
    <h1>👮 LSPD BLACKBERRY RP — ТЕСТ</h1>
    <div id="result" class="status">⏳ Проверка соединения с Supabase...</div>
    <div id="data"></div>
</div>
<script>
    const SUPABASE_URL = 'https://xhgudkefqmntnekaxgke.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Svhz_VfE3OTEJckPSHoHrw_2e5BxGQF';
    
    (async () => {
        const start = Date.now();
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/reports?select=count`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            const elapsed = Date.now() - start;
            if (response.ok) {
                const data = await response.json();
                document.getElementById('result').innerHTML = `✅ Успешно! Ответ за ${elapsed} мс`;
                document.getElementById('data').innerHTML = `<pre>В таблице reports: ${data.length} записей</pre>`;
            } else {
                document.getElementById('result').innerHTML = `❌ Ошибка ${response.status}: ${response.statusText}`;
            }
        } catch(e) {
            document.getElementById('result').innerHTML = `❌ Ошибка: ${e.message}`;
        }
    })();
</script>
</body>
</html>
