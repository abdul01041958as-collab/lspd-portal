<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSPD Blackberry RP — Дашборд</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui;background:#0a0c15;color:#e8edf5;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        h1{color:#00aaff;text-align:center;margin-bottom:20px}
        .top-bar{display:flex;justify-content:flex-end;background:#0f1425;padding:12px 20px;border-radius:50px;margin-bottom:30px}
        .nav-buttons{display:flex;gap:15px}
        .nav-btn{background:transparent;border:1px solid #00aaff;padding:8px 18px;border-radius:30px;color:#e8edf5;cursor:pointer}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:#1a1f2e;border-radius:16px;padding:20px;border-left:4px solid #00aaff;cursor:pointer}
        .dept-color-PAI{color:#00ff88}.dept-color-CPD{color:#00aaff}.dept-color-SWAT{color:#a0a0a0}
        .dept-color-IAD{color:#ff4444}.dept-color-PAD{color:#ffcc00}.dept-color-GATE{color:#ff8844}
        .form-card{background:#1a1f2e;border-radius:24px;padding:25px;margin-top:30px}
        input,select,textarea{width:100%;padding:12px;margin:10px 0;background:#0a0c15;border:1px solid #00aaff;color:#fff;border-radius:8px}
        .submit-btn{background:linear-gradient(135deg,#00aaff,#0066cc);color:#fff;padding:12px 24px;border:none;border-radius:40px;cursor:pointer}
        .reports-table-wrapper{overflow-x:auto;background:#1a1f2e;border-radius:24px;padding:20px;margin-top:20px}
        .reports-table{width:100%;border-collapse:collapse}
        .reports-table th,.reports-table td{padding:12px;text-align:left;border-bottom:1px solid #2a2f3e}
        .filter-buttons{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
        .filter-badge{background:#1a1f2e;border:1px solid #00aaff;padding:6px 14px;border-radius:20px;cursor:pointer}
        .filter-badge.active{background:#00aaff;color:#0a0c15}
        .role-select{background:#0a0c15;border:1px solid #00aaff;color:#fff;padding:6px 10px;border-radius:8px}
        footer{text-align:center;padding:30px;border-top:1px solid #1a1f2e;margin-top:40px}
        .loading{text-align:center;padding:40px;color:#00aaff}
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar"><div class="nav-buttons" id="navButtons"></div></div>
    <h1>👮 LSPD BLACKBERRY RP</h1>
    <div id="stats" class="stats-grid"></div>
    <div id="reportContainer"></div>
    <div id="activitiesContainer"></div>
    <div id="seniorContainer"></div>
    <footer>© 2026 LSPD | GTA 5 RP | Сервер Blackberry | To Protect and Serve</footer>
</div>

<script>
    const SUPABASE_URL = 'https://xhgudkefqmntnekaxgke.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Svhz_VfE3OTEJckPSHoHrw_2e5BxGQF';
    const CHIEF_USER = 'Lesterxzed';

    let currentUser = null;
    let allReports = [], currentReports = [], lastReports = [];
    let currentDept = 'PAI';
    let activityFilter = 'all';

    const deptActivities = {
        PAI: [{id:"PAI_interview",name:"Собеседование",norm:14},{id:"PAI_training",name:"Тренировка LSPD",norm:3}],
        CPD: [{id:"CPD_training",name:"Тренировка LSPD",norm:3},{id:"CPD_fines",name:"15 штрафов (за день)",norm:105},{id:"CPD_searches",name:"3 обыска (за день)",norm:21}],
        SWAT: [{id:"SWAT_airdrop",name:"Аир Дроп",norm:10},{id:"SWAT_training",name:"Тренировка",norm:3},{id:"SWAT_patrol",name:"Усиленный патруль",norm:4},{id:"SWAT_supply",name:"Поставка EMS/NG",norm:5}],
        IAD: [{id:"IAD_training",name:"Тренировка LSPD",norm:3},{id:"IAD_inspection",name:"Проверка документов (15/день)",norm:100},{id:"IAD_rounds",name:"2 объезда (за день)",norm:14}],
        PAD: [{id:"PAD_gmp",name:"ГМП",norm:1},{id:"PAD_mp",name:"МП",norm:2},{id:"PAD_participation",name:"Участие в мероприятии",norm:5}],
        GATE: [{id:"GATE_airdrop",name:"Аир Дроп",norm:10},{id:"GATE_training",name:"Тренировка",norm:3},{id:"GATE_patrol",name:"Усиленный патруль",norm:4},{id:"GATE_supply",name:"Поставка EMS/NG",norm:5}]
    };
    const roleNames = {1:'👑 Шеф',2:'⭐ Зам. Шефа',3:'Нач. PAI',4:'Нач. CPD',5:'Нач. SWAT',6:'Нач. IAD',7:'Нач. PAD',8:'Нач. GATE',9:'Зам. PAI',10:'Зам. CPD',11:'Зам. SWAT',12:'Зам. IAD',13:'Зам. PAD',14:'Зам. GATE',15:'Рядовой'};
    const weight = { 'CPD_fines':15, 'CPD_searches':3, 'IAD_rounds':2, 'IAD_inspection':15 };

    function getWeek(d=new Date()){let date=new Date(d);date.setHours(0,0,0,0);date.setDate(date.getDate()+3-(date.getDay()+6)%7);let w=new Date(date.getFullYear(),0,4);return 1+Math.round(((date-w)/86400000-3+(w.getDay()+6)%7)/7);}
    function getTotal(reports,dept,act){let t=0;for(let r of reports) if(r.dept===dept && r.activity_id===act) t+=weight[act]||1; return t;}
    function getProgress(reports,dept){let acts=deptActivities[dept];if(!acts)return 0;let s=0;for(let a of acts) s+=Math.min(100,Math.round((getTotal(reports,dept,a.id)/a.norm)*100)); return Math.round(s/acts.length);}

    async function fetchDB(path,opt={}){let h={'apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json'};let r=await fetch(`${SUPABASE_URL}${path}`,{...opt,headers:h});if(!r.ok)throw new Error(await r.text());return r.json();}
    async function loadReports(){let data=await fetchDB('/rest/v1/reports?select=*&order=date.desc');allReports=data;let cw=getWeek(),lw=cw-1;currentReports=allReports.filter(r=>getWeek(new Date(r.date))===cw);lastReports=allReports.filter(r=>getWeek(new Date(r.date))===lw);}
    async function loadUsers(){return await fetchDB('/rest/v1/users?select=*');}
    async function setRole(uid,rid,pos,dept){await fetchDB(`/rest/v1/users?id=eq.${uid}`,{method:'PATCH',body:JSON.stringify({role_id:rid,position_name:pos,department:dept})});}
    function canSend(user,dept){if(!user)return false;if(user.role_id===1||user.role_id===2)return true;return user.department===dept;}
    async function sendReport(data){if(!currentUser)return;await fetchDB('/rest/v1/reports',{method:'POST',body:JSON.stringify(data)});await loadReports();await fetchDB(`/rest/v1/users?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({reputation:(currentUser.reputation||0)+1,total_reports:(currentUser.total_reports||0)+1})});currentUser.reputation=(currentUser.reputation||0)+1;currentUser.total_reports=(currentUser.total_reports||0)+1;}

    async function renderStats(){let html='';for(let dept of ['PAI','CPD','SWAT','IAD','PAD','GATE']){let cur=getProgress(currentReports,dept), last=getProgress(lastReports,dept);html+=`<div class="stat-card" onclick="switchDept('${dept}')"><div><span class="dept-color-${dept}" style="font-size:22px;font-weight:800">${dept}</span></div><div style="display:flex;gap:30px;margin-top:10px"><div style="flex:1"><div style="color:#ffaa44">ПРОШЛАЯ</div><div style="font-size:28px">${last}%</div><div style="height:6px;background:#2a2f3e"><div style="width:${last}%;height:6px;background:#ffaa44"></div></div></div><div style="flex:1"><div style="color:#00ff88">ТЕКУЩАЯ</div><div style="font-size:28px">${cur}%</div><div style="height:6px;background:#2a2f3e"><div style="width:${cur}%;height:6px;background:#00ff88"></div></div></div></div></div>`;}document.getElementById('stats').innerHTML=html;}
    
    function renderActivities(){let f=currentReports;if(activityFilter!=='all') f=f.filter(r=>r.dept===activityFilter);if(!f.length){document.getElementById('activitiesContainer').innerHTML='<div class="loading">Нет отчётов</div>';return;}let html=`<div class="filter-buttons" id="actFilters"></div><div class="reports-table-wrapper"><table class="reports-table"><thead>运转<th>Офицер</th><th>Отдел</th><th>Активность</th><th>Описание</th><th>Дата</th></tr></thead><tbody>`;for(let r of f.slice().reverse()){let an=deptActivities[r.dept]?.find(a=>a.id===r.activity_id)?.name||r.activity_id;html+=`<tr><td><strong>${r.officer_name}</strong></td><td>${r.dept}</td><td>${an}</td><td>${r.description?.substring(0,80)}</td><td>${new Date(r.date).toLocaleString()}</td></tr>`;}html+=`</tbody></table></div>`;document.getElementById('activitiesContainer').innerHTML=html;let fd=document.getElementById('actFilters');if(fd)fd.innerHTML=['all','PAI','CPD','SWAT','IAD','PAD','GATE'].map(d=>`<span class="filter-badge ${activityFilter===d?'active':''}" data-f="${d}">${d==='all'?'Все':d}</span>`).join('');document.querySelectorAll('.filter-badge').forEach(el=>el.onclick=()=>{activityFilter=el.dataset.f;renderActivities();});}
    
    async function renderSenior(){let users=await loadUsers();if(!users.length){document.getElementById('seniorContainer').innerHTML='<div class="loading">Нет данных</div>';return;}let html=`<div class="reports-table-wrapper"><table class="reports-table"><thead><tr><th>Имя Фамилия</th><th>Должность</th>${(currentUser&&(currentUser.role_id===1||currentUser.role_id===2))?'<th></th>':''}</tr></thead><tbody>`;for(let u of users){html+=`<tr><td>${u.first_name} ${u.last_name}</td><td>${roleNames[u.role_id]||'Рядовой'}</td>`;if(currentUser&&(currentUser.role_id===1||currentUser.role_id===2)){html+=`<td><select class="role-select" onchange="changeRole('${u.id}',this.value)">${getRoles(u.role_id)}</select></td>`;}html+=`</tr>`;}html+=`</tbody></table></div>`;document.getElementById('seniorContainer').innerHTML=html;}
    
    function getRoles(rid){let rs=[{id:1,name:'Шеф'},{id:2,name:'Зам.Шефа'},{id:3,name:'Нач.PAI'},{id:4,name:'Нач.CPD'},{id:5,name:'Нач.SWAT'},{id:6,name:'Нач.IAD'},{id:7,name:'Нач.PAD'},{id:8,name:'Нач.GATE'},{id:9,name:'Зам.PAI'},{id:10,name:'Зам.CPD'},{id:11,name:'Зам.SWAT'},{id:12,name:'Зам.IAD'},{id:13,name:'Зам.PAD'},{id:14,name:'Зам.GATE'},{id:15,name:'Рядовой'}];return rs.map(r=>`<option value="${r.id}" ${rid===r.id?'selected':''}>${r.name}</option>`).join('');}
    
    function renderReportForm(){let cont=document.getElementById('reportContainer');if(!currentUser){cont.innerHTML=`<div class="form-card"><h3>Вход</h3><input id="loginName" placeholder="Ваш логин"><button class="submit-btn" onclick="login()">Войти</button></div>`;return;}if(!canSend(currentUser,currentDept)){cont.innerHTML=`<div class="form-card">⛔ Нет прав для отдела ${currentDept}</div>`;return;}let sel=`<select id="actSelect">`;for(let a of deptActivities[currentDept]) sel+=`<option value="${a.id}">${a.name} (норма: ${a.norm})</option>`;sel+=`</select><div id="progDiv"></div>`;cont.innerHTML=`<div class="form-card"><h3>ОТЧЕТ ${currentDept}</h3>${sel}<textarea id="desc" rows="3" placeholder="Описание"></textarea><input id="proof" placeholder="Ссылка"><button class="submit-btn" onclick="send()">ОТПРАВИТЬ</button></div>`;let reps=currentReports.filter(r=>r.dept===currentDept);let prog='';for(let a of deptActivities[currentDept]){let t=getTotal(reps,currentDept,a.id);let p=Math.min(100,Math.round((t/a.norm)*100));prog+=`<div><div style="display:flex;justify-content:space-between"><span>${a.name}</span><span>${t}/${a.norm}</span></div><div style="height:4px;background:#2a2f3e"><div style="width:${p}%;height:4px;background:#00ff88"></div></div></div>`;}document.getElementById('progDiv').innerHTML=prog;}
    
    window.switchDept=function(d){currentDept=d;renderReportForm();document.getElementById('stats').scrollIntoView({behavior:'smooth'});};
    window.send=async function(){if(!currentUser)return;let a=document.getElementById('actSelect').value,d=document.getElementById('desc').value.trim(),p=document.getElementById('proof').value.trim();if(!a||!d){alert('Заполните поля');return;}let an=deptActivities[currentDept].find(x=>x.id===a)?.name;await sendReport({dept:currentDept,officer_name:`${currentUser.first_name} ${currentUser.last_name}`,activity_id:a,activityName:an,description:d,proof:p||null,date:new Date().toISOString()});await refreshAll();};
    
    window.login=async function(){let un=document.getElementById('loginName').value.trim();if(!un){alert('Введите логин');return;}let users=await fetchDB(`/rest/v1/users?username=eq.${encodeURIComponent(un)}`);let user=users[0];if(!user){user={username:un,first_name:un,last_name:'',role_id:15,position_name:'Рядовой сотрудник',hired_date:new Date().toISOString()};await fetchDB('/rest/v1/users',{method:'POST',body:JSON.stringify(user)});}currentUser=user;localStorage.setItem('lspd_user',JSON.stringify(currentUser));document.getElementById('navButtons').innerHTML=`<span style="color:#00ff88">${currentUser.first_name} ${currentUser.last_name}</span><button class="nav-btn" onclick="logout()">Выйти</button>`;if(currentUser.first_name===currentUser.username||!currentUser.last_name){showNameForm();}else{await refreshAll();}};
    
    function showNameForm(){document.getElementById('reportContainer').innerHTML=`<div style="max-width:400px;margin:20px auto"><h3>Имя и фамилия</h3><input id="fn" placeholder="Имя"><input id="ln" placeholder="Фамилия"><button class="submit-btn" onclick="saveName()">Сохранить</button></div>`;}
    window.saveName=async function(){let f=document.getElementById('fn').value.trim(),l=document.getElementById('ln').value.trim();if(!f||!l)return;await fetchDB(`/rest/v1/users?id=eq.${currentUser.id}`,{method:'PATCH',body:JSON.stringify({first_name:f,last_name:l})});currentUser.first_name=f;currentUser.last_name=l;localStorage.setItem('lspd_user',JSON.stringify(currentUser));document.getElementById('navButtons').innerHTML=`<span style="color:#00ff88">${currentUser.first_name} ${currentUser.last_name}</span><button class="nav-btn" onclick="logout()">Выйти</button>`;await refreshAll();};
    
    window.changeRole=async function(uid,rid){rid=parseInt(rid);if(currentUser.role_id===2){let us=await loadUsers();let tu=us.find(u=>u.id===uid);if(tu.role_id===1||tu.role_id===2){alert('Нельзя менять шефа или зам.шефа');return;}}let pos='',dept=null;if(rid===1)pos='Шеф';else if(rid===2)pos='Зам.Шефа';else if(rid===3){pos='Нач.PAI';dept='PAI';}else if(rid===4){pos='Нач.CPD';dept='CPD';}else if(rid===5){pos='Нач.SWAT';dept='SWAT';}else if(rid===6){pos='Нач.IAD';dept='IAD';}else if(rid===7){pos='Нач.PAD';dept='PAD';}else if(rid===8){pos='Нач.GATE';dept='GATE';}else if(rid===9){pos='Зам.PAI';dept='PAI';}else if(rid===10){pos='Зам.CPD';dept='CPD';}else if(rid===11){pos='Зам.SWAT';dept='SWAT';}else if(rid===12){pos='Зам.IAD';dept='IAD';}else if(rid===13){pos='Зам.PAD';dept='PAD';}else if(rid===14){pos='Зам.GATE';dept='GATE';}else{pos='Рядовой';dept=null;}await setRole(uid,rid,pos,dept);refreshAll();};
    
    window.logout=function(){localStorage.clear();currentUser=null;location.reload();};
    
    async function refreshAll(){await loadReports();await renderStats();renderActivities();renderReportForm();await renderSenior();}
    async function loadUser(){let s=localStorage.getItem('lspd_user');if(s){currentUser=JSON.parse(s);document.getElementById('navButtons').innerHTML=`<span style="color:#00ff88">${currentUser.first_name} ${currentUser.last_name}</span><button class="nav-btn" onclick="logout()">Выйти</button>`;await refreshAll();}else{await refreshAll();renderReportForm();}}
    loadUser();
</script>
</body>
</html>
