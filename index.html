<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LSPD Blackberry RP — Официальный портал</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0c15;color:#e8edf5;padding:20px}
        .container{max-width:1300px;margin:0 auto}
        .hero{position:relative;min-height:60vh;background:linear-gradient(135deg,#0a0c15 0%,#0f1535 50%,#0a0c15 100%);display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
        .waves-bg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.35}
        .hero-content{position:relative;z-index:2;max-width:800px;padding:40px 20px}
        .lspd-badge{font-size:80px;margin-bottom:20px;text-shadow:0 0 20px #00aaff;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .hero h1{font-size:56px;font-weight:800;background:linear-gradient(135deg,#fff,#00aaff);-webkit-background-clip:text;background-clip:text;color:transparent}
        .hero .subtitle{font-size:18px;color:#8a9bc0}
        .main-content{background:#0a0c15;padding:60px 20px}
        .section-title{text-align:center;font-size:32px;margin-bottom:40px;color:#00aaff}
        .compact-stats{display:flex;flex-direction:column;gap:15px;max-width:800px;margin:0 auto}
        .compact-dept-card{background:linear-gradient(135deg,#1a1f2e,#0f1425);border-radius:16px;padding:18px 24px;border-left:4px solid #00aaff;cursor:pointer}
        .compact-dept-card:hover{transform:translateX(5px);background:#1f2538}
        .dept-color-PAI{color:#00ff88}.dept-color-CPD{color:#00aaff}.dept-color-SWAT{color:#a0a0a0}
        .dept-color-IAD{color:#ff4444}.dept-color-PAD{color:#ffcc00}.dept-color-GATE{color:#ff8844}.dept-color-DB{color:#ff66cc}
        .compare-row{display:flex;gap:30px;margin-top:10px}
        .week-compare{flex:1}
        .week-label{font-size:11px;color:#8a9bc0}
        .week-label.last{color:#ffaa44}
        .week-label.current{color:#00ff88}
        .percent-value{font-size:28px;font-weight:800}
        .percent-bar{height:6px;background:#2a2f3e;border-radius:3px;margin-top:8px}
        .percent-bar-fill{height:100%;border-radius:3px}
        .percent-bar-fill.last{background:#ffaa44}
        .percent-bar-fill.current{background:#00ff88}
        .form-card{background:#1a1f2e;border-radius:24px;padding:30px;margin-top:30px}
        input,select,textarea{width:100%;padding:12px;margin:10px 0;background:#0a0c15;border:1px solid #00aaff;color:#fff;border-radius:8px}
        .submit-btn{background:linear-gradient(135deg,#00aaff,#0066cc);color:#fff;padding:12px 24px;border:none;border-radius:40px;cursor:pointer}
        .reports-table-wrapper{overflow-x:auto;background:#1a1f2e;border-radius:24px;padding:20px;margin-top:20px}
        .reports-table{width:100%;border-collapse:collapse}
        .reports-table th,.reports-table td{padding:12px;text-align:left;border-bottom:1px solid #2a2f3e}
        .reports-table th{color:#00aaff}
        .filter-buttons{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
        .filter-badge{background:#1a1f2e;border:1px solid #00aaff;padding:6px 14px;border-radius:20px;cursor:pointer}
        .filter-badge.active{background:#00aaff;color:#0a0c15}
        footer{text-align:center;padding:30px;margin-top:40px;color:#6a7c9e}
        .loading{text-align:center;padding:40px;color:#00aaff}
        .dept-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:30px}
        .dept-nav-btn{padding:10px 20px;background:#1a1f2e;border:1px solid #00aaff;border-radius:40px;color:#fff;cursor:pointer}
        .dept-nav-btn.active{background:#00aaff;color:#0a0c15}
        .dept-info-card{background:#1a1f2e;border-radius:24px;padding:35px;border-left:5px solid #00aaff;margin-bottom:30px}
        .dept-header{display:flex;align-items:center;gap:15px;margin-bottom:25px}
        .dept-icon{font-size:48px}
        .dept-name-title{font-size:32px;font-weight:800;color:#00aaff}
        .dept-fullname{font-size:18px;color:#8a9bc0}
        .dept-desc{color:#c0c8e0;line-height:1.7}
        .dept-desc ul{margin-left:20px;margin-bottom:15px}
        .requirement{background:rgba(0,170,255,0.1);padding:15px;border-radius:12px;margin-top:20px;border-left:3px solid #ffaa00}
        .report-form-card{background:#1a1f2e;border-radius:24px;padding:30px;margin-top:20px}
        .activity-select{width:100%;padding:12px;margin:10px 0 20px;background:#0a0c15;border:1px solid #00aaff;border-radius:8px;color:#fff}
        .progress-info{background:rgba(0,255,136,0.1);border-radius:12px;padding:15px;margin-bottom:20px}
    </style>
</head>
<body>
<div class="hero">
    <svg class="waves-bg" viewBox="0 0 1440 320"><path fill="#00aaff" fill-opacity="0.08" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,261.3C672,256,768,224,864,208C960,192,1056,192,1152,197.3C1248,203,1344,213,1392,218.7L1440,224L1440,0L1392,0C1344,0,1248,0,1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z"/></svg>
    <div class="hero-content"><div class="lspd-badge">👮‍♂️⭐👮‍♀️</div><h1>LSPD</h1><div class="subtitle">LOS SANTOS POLICE DEPARTMENT</div><div class="subtitle" style="font-size:14px">GTA 5 RP | сервер Blackberry</div></div>
</div>
<div class="main-content"><div class="container">
    <div class="dept-nav" id="deptNav"></div>
    <div id="stats" class="stats-section"><h2 class="section-title">📊 СТАТИСТИКА ОТДЕЛОВ</h2><div id="compactStats" class="compact-stats"><div class="loading">⏳ ЗАГРУЗКА...</div></div></div>
    <div id="reportSection" class="form-card"><div id="reportContent"></div></div>
    <div id="activitiesSection"><h2 class="section-title">📋 ОТЧЁТЫ ПО НАПРАВЛЕНИЯМ</h2><div id="activitiesFilters" class="filter-buttons"></div><div id="activitiesReportsContainer" class="reports-table-wrapper"><div class="loading">⏳ ЗАГРУЗКА...</div></div></div>
</div></div>
<footer>© 2026 Фракция LSPD | Los Santos Police Department | GTA 5 RP | Сервер Blackberry | To Protect and Serve</footer>
<script>
    const SUPABASE_URL = 'https://xhgudkefqmntnekaxgke.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Svhz_VfE3OTEJckPSHoHrw_2e5BxGQF';
    
    const activityWeight = { 'CPD_fines':15, 'CPD_searches':3, 'IAD_rounds':2, 'IAD_inspection':15 };
    
    const departmentActivities = {
        PAI: [
            {id:"PAI_interview",name:"Собеседование",norm:14},
            {id:"PAI_training",name:"Тренировка LSPD",norm:3},
            {id:"PAI_lecture",name:"Лекции сотрудникам LSPD",norm:5},
            {id:"PAI_bleks",name:"Закрыть задания на блексы",norm:2}
        ],
        CPD: [
            {id:"CPD_training",name:"Тренировка LSPD",norm:3},
            {id:"CPD_fines",name:"15 штрафов (за день)",norm:105},
            {id:"CPD_searches",name:"3 обыска (за день)",norm:21},
            {id:"CPD_bleks",name:"Закрыть задания на блексы",norm:2}
        ],
        SWAT: [
            {id:"SWAT_airdrop",name:"Аир Дроп",norm:10},
            {id:"SWAT_training",name:"Тренировка LSPD",norm:3},
            {id:"SWAT_patrol",name:"Усиленный патруль",norm:10},
            {id:"SWAT_supply",name:"Поставка EMS/NG",norm:10},
            {id:"SWAT_bleks",name:"Закрыть задания на блексы",norm:2}
        ],
        IAD: [
            {id:"IAD_training",name:"Тренировка LSPD",norm:3},
            {id:"IAD_inspection",name:"Проверка документов (15/день)",norm:105},
            {id:"IAD_rounds",name:"2 объезда (за день)",norm:14},
            {id:"IAD_bleks",name:"Закрыть задания на блексы",norm:2}
        ],
        PAD: [
            {id:"PAD_gmp",name:"ГМП",norm:1},
            {id:"PAD_mp",name:"МП",norm:2},
            {id:"PAD_participation",name:"Участие в мероприятии",norm:5}
        ],
        GATE: [
            {id:"GATE_training",name:"Тренировка LSPD",norm:5},
            {id:"GATE_gsp_train",name:"Реакция на ГШ/ПОЕЗД",norm:10},
            {id:"GATE_racket",name:"Реакция на РЕКЕТ магазинов",norm:10},
            {id:"GATE_bleks",name:"Закрыть задания на блексы",norm:2}
        ],
        DB: [
            {id:"DB_assault",name:"Штурм титульного района крайм фракции",norm:2},
            {id:"DB_training",name:"Тренировка LSPD",norm:3},
            {id:"DB_case",name:"Кейс на внедрение",norm:2},
            {id:"DB_bleks",name:"Закрыть задания на блексы",norm:2}
        ]
    };
    
    const deptColor = { 'PAI':'#00ff88','CPD':'#00aaff','SWAT':'#a0a0a0','IAD':'#ff4444','PAD':'#ffcc00','GATE':'#ff8844','DB':'#ff66cc' };
    
    const departmentsInfo = {
        PAI: {icon:"📚",name:"PAI",fullname:"Police Academy Instructors",desc:"Учебное подразделение LSPD.",tasks:["приём новобранцев","обучение кадетов","проведение экзаменов","переаттестация","отчисление","повышение квалификации"]},
        CPD: {icon:"🚔",name:"CPD",fullname:"Central Police Division",desc:"Основное патрульное подразделение.",tasks:["патрулирование","общественный порядок","реагирование на вызовы","пресечение нарушений","первичное реагирование","поддержка"]},
        SWAT: {icon:"🔫",name:"SWAT",fullname:"Special Weapons And Tactics",desc:"Подразделение тактического реагирования.",tasks:["штурмовые операции","освобождение заложников","подавление сопротивления","задержание опасных преступников","поддержка","контртеррор"],requirement:"Ранг не ниже 4 (Офицер), без взысканий"},
        IAD: {icon:"⚖️",name:"IAD",fullname:"Internal Affairs Division",desc:"Внутренний контроль и расследования.",tasks:["внутренние расследования","проверка жалоб","контроль устава","профилактика","проверка взысканий","этический кодекс"],requirement:"Ранг не ниже 4 (Офицер), без взысканий"},
        PAD: {icon:"📢",name:"PAD",fullname:"Public Affairs Division",desc:"Связи с общественностью.",tasks:["взаимодействие с населением","мероприятия","имидж LSPD","связи с гражданскими","освещение деятельности","пресс-конференции"]},
        GATE: {icon:"⚡",name:"GATE",fullname:"Gang Activity Territorial Enforcement",desc:"Силовая поддержка госструктур.",tasks:["реагирование на нападения","захваты","коды планшета","спецоперации"]},
        DB: {icon:"🕵️",name:"DB",fullname:"Detective Bureau",desc:"Следственно-оперативное подразделение.",tasks:["расследование","ОРМ","сбор доказательств","взаимодействие с прокуратурой","работа с источниками","раскрытие преступлений"],requirement:"Ранг не ниже 4 (Офицер), без взысканий"}
    };
    
    let allReports=[], currentReports=[], lastReports=[], currentDept='PAI', activityFilter='all';
    
    function getWeekNumber(d=new Date()){let date=new Date(d);date.setHours(0,0,0,0);date.setDate(date.getDate()+3-(date.getDay()+6)%7);let week1=new Date(date.getFullYear(),0,4);return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);}
    function getActivityTotal(reports,deptId,activityId){let total=0;for(let r of reports) if(r.dept===deptId && r.activity_id===activityId) total+=activityWeight[activityId]||1; return total;}
    function calculateDeptProgress(reports,deptId){let acts=departmentActivities[deptId];if(!acts)return 0;let sum=0;for(let a of acts){let total=getActivityTotal(reports,deptId,a.id);sum+=Math.min(100,Math.round((total/a.norm)*100));}return Math.round(sum/acts.length);}
    
    async function fetchReports(){
        let r=await fetch(`${SUPABASE_URL}/rest/v1/reports?select=*&order=date.desc`,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}});
        if(!r.ok)throw new Error('Ошибка');
        allReports=await r.json();
        let cw=getWeekNumber(), lw=cw-1;
        currentReports=allReports.filter(r=>getWeekNumber(new Date(r.date))===cw);
        lastReports=allReports.filter(r=>getWeekNumber(new Date(r.date))===lw);
        updateAllStats(); updateActivitiesReportsPage(); updateReportForm();
    }
    
    async function submitReport(d){
        await fetch(`${SUPABASE_URL}/rest/v1/reports`,{method:'POST',headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(d)});
        await fetchReports();
    }
    
    function updateAllStats(){
        let html='';
        for(let dept of ['PAI','CPD','SWAT','IAD','PAD','GATE','DB']){
            let cur=calculateDeptProgress(currentReports,dept);
            let last=calculateDeptProgress(lastReports,dept);
            html+=`<div class="compact-dept-card" onclick="switchToDept('${dept}')"><div><span style="color:${deptColor[dept]};font-size:22px;font-weight:800">${dept}</span></div><div class="compare-row"><div class="week-compare"><div class="week-label last">ПРОШЛАЯ НЕДЕЛЯ</div><div class="percent-value last">${last}%</div><div class="percent-bar"><div class="percent-bar-fill last" style="width:${last}%"></div></div></div><div class="week-compare"><div class="week-label current">ТЕКУЩАЯ НЕДЕЛЯ</div><div class="percent-value current">${cur}%</div><div class="percent-bar"><div class="percent-bar-fill current" style="width:${cur}%"></div></div></div></div></div>`;
        }
        document.getElementById('compactStats').innerHTML=html;
    }
    
    function updateActivitiesReportsPage(){
        let filtered=currentReports;
        if(activityFilter!=='all') filtered=filtered.filter(r=>r.dept===activityFilter);
        if(!filtered.length){document.getElementById('activitiesReportsContainer').innerHTML='<div class="loading">📭 Нет отчётов</div>';return;}
        let html=`<table class="reports-table"><thead>运转<th>Офицер</th><th>Отдел</th><th>Активность</th><th>Описание</th><th>Док-ва</th><th>Дата</th></tr></thead><tbody>`;
        for(let r of filtered.slice().reverse()){
            let actName=departmentActivities[r.dept]?.find(a=>a.id===r.activity_id)?.name||r.activity_id;
            let proofHtml=r.proof?`<a href="${escape(r.proof)}" target="_blank" style="color:#00ff88">🔗 Ссылка</a>`:'—';
            html+=`<tr>
                <td><strong>${escape(r.officer_name)}</strong></td>
                <td>${r.dept}</td>
                <td>${escape(actName)}</td>
                <td>${escape(r.description)}</td>
                <td>${proofHtml}</td>
                <td>${new Date(r.date).toLocaleString()}</td>
            </tr>`;
        }
        html+=`</tbody></table>`;
        document.getElementById('activitiesReportsContainer').innerHTML=html;
    }
    
    function updateReportForm(){
        const container=document.getElementById('reportContent');
        let acts=departmentActivities[currentDept];
        if(!acts){container.innerHTML=`<div class="progress-info">Для отдела ${currentDept} отчёты не ведутся</div>`;return;}
        let selectHtml=`<select id="activitySelect" class="activity-select"><option value="">-- Выберите действие --</option>`;
        for(let act of acts) selectHtml+=`<option value="${act.id}">${act.name} (норма: ${act.norm})</option>`;
        selectHtml+=`</select><div id="progressDept"></div>`;
        container.innerHTML=`<h3>📝 ОТЧЕТ ${currentDept}</h3>${selectHtml}<textarea id="reportDesc" rows="3" placeholder="Описание выполненной работы..."></textarea><input type="text" id="reportProof" placeholder="🔗 Ссылка на доказательства"><button class="submit-btn" onclick="sendReport()">📬 ОТПРАВИТЬ ОТЧЕТ</button>`;
        let reportsForDept=currentReports.filter(r=>r.dept===currentDept);
        let progHtml='<div style="margin-top:15px;">';
        for(let act of acts){
            let total=getActivityTotal(reportsForDept,currentDept,act.id);
            let percent=Math.min(100,Math.round((total/act.norm)*100));
            progHtml+=`<div><div style="display:flex;justify-content:space-between"><span>${act.name}</span><span>${total}/${act.norm}</span></div><div style="height:4px;background:#2a2f3e"><div style="width:${percent}%;height:4px;background:linear-gradient(90deg,#00ff88,#00aaff)"></div></div></div>`;
        }
        progHtml+='</div>';
        document.getElementById('progressDept').innerHTML=progHtml;
    }
    
    window.sendReport=async()=>{
        let a=document.getElementById('activitySelect').value, d=document.getElementById('reportDesc').value.trim(), p=document.getElementById('reportProof').value.trim();
        if(!a||!d){alert('Выберите действие и описание');return;}
        let actName=departmentActivities[currentDept].find(act=>act.id===a)?.name;
        await submitReport({dept:currentDept,officer_name:document.getElementById('officerName')?.value.trim()||'Аноним',activity_id:a,activityName:actName,description:d,proof:p||null,date:new Date().toISOString()});
    };
    
    window.switchToDept=(dept)=>{currentDept=dept;updateReportForm();document.getElementById('stats').scrollIntoView({behavior:'smooth'});};
    window.showDeptsInfo=()=>{
        let info='<div style="background:#1a1f2e;border-radius:24px;padding:25px;margin-top:20px;"><h3 style="color:#00aaff">🏢 ИНФОРМАЦИЯ ОБ ОТДЕЛАХ</h3>';
        for(let [key,d] of Object.entries(departmentsInfo)){
            info+=`<div style="margin-top:15px;"><strong style="color:#00aaff">${d.name}</strong> — ${d.desc}<br><span style="font-size:12px;color:#8a9bc0">${d.tasks.join(', ')}</span>${d.requirement?`<div style="color:#ffaa44;font-size:12px;margin-top:5px">⚠️ ${d.requirement}</div>`:''}</div>`;
        }
        info+='</div>';
        document.getElementById('reportContent').innerHTML+=info;
    };
    
    function escape(s){return s?.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;')||'';}
    
    function setupFilters(){
        let div=document.getElementById('activitiesFilters');
        let depts=['all','PAI','CPD','SWAT','IAD','PAD','GATE','DB'];
        div.innerHTML=depts.map(d=>`<span class="filter-badge ${activityFilter===d?'active':''}" data-filter="${d}">${d==='all'?'Все':d}</span>`).join('');
        document.querySelectorAll('.filter-badge').forEach(el=>el.addEventListener('click',()=>{
            activityFilter=el.dataset.filter;
            document.querySelectorAll('.filter-badge').forEach(f=>f.classList.remove('active'));
            el.classList.add('active');
            updateActivitiesReportsPage();
        }));
    }
    
    async function init(){
        let nav=document.getElementById('deptNav');
        nav.innerHTML='';
        for(let d of ['PAI','CPD','SWAT','IAD','PAD','GATE','DB']){
            let btn=document.createElement('button');
            btn.className='dept-nav-btn'+(d==='PAI'?' active':'');
            btn.textContent=d;
            btn.onclick=()=>switchToDept(d);
            nav.appendChild(btn);
        }
        let infoBtn=document.createElement('button');
        infoBtn.className='dept-nav-btn';
        infoBtn.textContent='🏢 ИНФО';
        infoBtn.onclick=()=>showDeptsInfo();
        nav.appendChild(infoBtn);
        await fetchReports();
        setupFilters();
        updateReportForm();
        switchToDept('PAI');
    }
    init();
</script>
</body>
</html>
